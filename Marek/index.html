<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedofil Hra!</title> <!-- Change "Your Website Title" to your desired title -->
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

<button onclick="toggleTheme()" class="theme-btn">Toggle Theme</button>

<div class="container">
  <div class="content">
    <h1 style="font-family: 'Dosis', sans-serif; font-weight: bold; text-align: center;">Marek Ted Brečí Co Uděláš Ted</h1>
    <button onclick="window.location.href='https://pedofilhra.github.io/Utict/index.html'" class="btn" style="width: 200px; height: 60px;">Utíct</button>
    <button onclick="window.location.href='https://pedofilhra.github.io'" class="btn" style="width: 200px; height: 60px;">Uzdravit ho a jít zpátky</button>
  </div>
</div>

<script>
function toggleTheme() {
  document.body.classList.toggle('light-theme');
  var themeBtn = document.querySelector('.theme-btn');
  if (document.body.classList.contains('light-theme')) {
    themeBtn.style.color = 'black'; // Set text color to black for light theme
  } else {
    themeBtn.style.color = 'white'; // Set text color to white for dark theme
  }
}
</script>

</body>
</html>
