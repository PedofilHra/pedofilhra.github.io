<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<title>Pedofil Hra!</title> <!-- Change "Your Website Title" to your desired title -->
<link rel="stylesheet" href="styles.css">
<link href="https://fonts.googleapis.com/css2?family=Dosis:wght@700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

<button onclick="toggleTheme()" class="theme-btn">Toggle Theme</button>

<div class="container">
  <button onclick="window.location.href='https://pedofilhra.github.io/Marek'" class="btn" style="width: 200px; height: 60px;">Ošukat Marka</button>
  <button onclick="window.location.href='https://sites.google.com/view/pedofilskeklobasy/ondr%C3%AD%C5%A1'" class="btn" style="width: 200px; height: 60px;">Ošukat Ondrášovu Mámu</button>
</div>

<script>
function toggleTheme() {
  document.body.classList.toggle('light-theme');
  var themeBtn = document.querySelector('.theme-btn');
  if (document.body.classList.contains('light-theme')) {
    themeBtn.style.color = 'black'; // Set text color to black for light theme
  } else {
    themeBtn.style.color = 'white'; // Set text color to white for dark theme
  }
}
</script>

</body>
</html>
